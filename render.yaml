databases:
  - name: ono-market-db
    plan: free

services:
  - type: web
    name: ono-market
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ono-market-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      - key: SOLAPI_API_KEY
        sync: false
      - key: SOLAPI_API_SECRET
        sync: false
      - key: SOLAPI_SENDER_NUMBER
        sync: false
      - key: ADMIN_PHONE
        sync: false
