{% extends "base.html" %}{% block body %}<main><h1>마이페이지</h1><div class="cols"><section class="panel"><h2>회원정보</h2><form class="stack" method="post"><input value="{{u.email}}" disabled><input name="name" value="{{u.name}}" required><input name="phone" value="{{u.phone}}" required><textarea name="address" placeholder="기본 배송지">{{u.address}}</textarea><button>회원정보 수정</button></form></section><section class="panel"><h2>비밀번호 변경</h2><form class="stack" method="post" action="/password"><input type="password" name="current" placeholder="현재 비밀번호" required><input type="password" name="new" placeholder="새 비밀번호 6자 이상" required><button>비밀번호 변경</button></form><hr><form method="post" action="/withdraw" onsubmit="return confirm('정말 탈퇴할까요?')"><button class="danger">회원 탈퇴</button></form></section></div><section class="panel"><h2>내 주문내역</h2>{% for o in orders %}<div class="tr"><b>#{{o.id}}</b><span>{{o.created_at}}</span><span>{{"{:,}".format(o.total)}}원</span><b>{{o.status}}</b></div>{% else %}<p>주문내역이 없습니다.</p>{% endfor %}</section></main>{% endblock %}
