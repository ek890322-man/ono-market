{% extends "base.html" %}{% block body %}
<section class="hero"><h1>{{site.hero_title}}</h1><p>{{site.hero_text}}</p></section>
<main><div class="shopbar"><input id="search" placeholder="상품 검색"><button onclick="openCart()">장바구니 <b id="count">0</b></button></div><div id="filters" class="filters"></div><div id="grid" class="grid"></div></main>
<div id="shade" class="shade" onclick="closeCart()"></div><aside id="cartDrawer" class="drawer"><h2>장바구니</h2><div id="items" class="grow"></div><div class="carttotal"><span>결제 예정금액</span><b id="total">0원</b></div><button id="checkoutBtn" onclick="showOrder()">결제하기</button><button class="light" onclick="closeCart()">닫기</button></aside>
<div id="modal" class="modal"><form id="orderForm" class="checkoutform"><h2>주문 / 결제</h2><section class="ordersummary"><h3>주문 상품</h3><div id="orderSummary"></div><div class="paytotal"><span>최종 결제금액</span><b id="payTotal">0원</b></div></section><h3>배송 정보</h3><input name="name" value="{{session.user_name or ''}}" placeholder="주문자명" required><input name="phone" placeholder="연락처" required><input name="address" placeholder="배송 주소" required><textarea name="memo" placeholder="배송 메모"></textarea><h3>결제수단</h3><div class="paymethods"><label><input type="radio" name="payment_method" value="카드결제" checked> 카드결제</label><label><input type="radio" name="payment_method" value="계좌이체"> 계좌이체</label><label><input type="radio" name="payment_method" value="무통장입금"> 무통장입금</label></div><p class="paynotice">현재는 실제 PG 카드승인 전 주문·결제 화면 테스트 단계입니다.</p><button>결제 및 주문 접수</button><button type="button" class="light" onclick="modal.style.display='none'">취소</button></form></div>
<script>window.PRODUCTS={{products_json|tojson}};</script><script src="{{url_for('static',filename='shop.js')}}"></script>{% endblock %}
