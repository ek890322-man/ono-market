<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{site.shop_name}}</title><link rel="stylesheet" href="{{url_for('static',filename='style.css')}}"><style>:root{--site-accent:{{site.accent_color}};--site-bg:{{site.background_color}};--hero-a:{{site.hero_start}};--hero-b:{{site.hero_end}}}</style></head><body>
<header><nav><a class="logo" href="/">{{site.shop_name}}</a><span class="grow"></span>{% if session.user_id %}<a href="/mypage">{{session.user_name}}님</a><a href="/logout">로그아웃</a>{% else %}<a href="/login">로그인</a><a href="/signup">회원가입</a>{% endif %}</nav></header>
{% with msgs=get_flashed_messages() %}{% if msgs %}<div class="flash">{{msgs[-1]}}</div>{% endif %}{% endwith %}
{% block body %}{% endblock %}</body></html>
