{% extends "base.html" %}{% block body %}
<main class="cart-page">
  <div class="cart-page-head"><div><h1>장바구니</h1><p>담은 상품을 확인하고 수량을 변경할 수 있어요.</p></div><a href="/">쇼핑 계속하기</a></div>
  <section class="panel cart-page-panel">
    <div id="cartPageItems"></div>
    <div id="cartPageEmpty" class="empty-orders" style="display:none"><h2>장바구니가 비어 있어요</h2><p>마음에 드는 상품을 담아보세요.</p><a href="/">상품 보러가기</a></div>
    <div id="cartPageSummary" class="cart-page-summary">
      <div><span>총 상품 수량</span><b id="cartPageCount">0개</b></div>
      <div class="cart-page-total"><span>결제 예정금액</span><b id="cartPageTotal">0원</b></div>
      <button type="button" onclick="goCheckout()">주문 / 결제하기</button>
    </div>
  </section>
</main>
<script>window.PRODUCTS={{products_json|tojson}};</script>
<script src="{{url_for('static',filename='cart-page.js')}}"></script>
{% endblock %}
